<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login - WeatherWise</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">
    <div class="card p-4 shadow-sm" style="width: 360px;">
        <h3 class="text-center mb-3">Iniciar sesión</h3>

        <form id="loginForm" novalidate>
            <div class="mb-3">
                <label for="email" class="form-label">Correo electrónico</label>
                <input type="email" id="email" name="email" class="form-control" autocomplete="email" required>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Contraseña</label>
                <input type="password" id="password" name="password" class="form-control" autocomplete="current-password" required>
            </div>

            <button class="btn btn-danger w-100" type="submit">Ingresar</button>
        </form>

        <div class="mt-3 text-muted small">
            Usa <strong>admin@weatherwise.com</strong> / <strong>Admin123</strong>
        </div>
    </div>

    <script>
        // Asegúrate de que el servidor esté corriendo y que el endpoint /api/login exista
        (function () {
            const form = document.getElementById('loginForm');
            if (!form) return;

            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                // Validación básica antes de enviar
                const emailEl = document.getElementById('email');
                const passEl = document.getElementById('password');
                const email = emailEl.value.trim();
                const password = passEl.value;

                if (!email) {
                    alert('Ingresa tu correo electrónico.');
                    emailEl.focus();
                    return;
                }
                if (!password) {
                    alert('Ingresa tu contraseña.');
                    passEl.focus();
                    return;
                }

                try {
                    const resp = await fetch('/api/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });

                    // Si el servidor devuelve JSON con mensaje, lo mostramos
                    const contentType = resp.headers.get('Content-Type') || '';
                    const isJson = contentType.includes('application/json');
                    const body = isJson ? await resp.json() : null;

                    if (resp.ok) {
                        // Redirigir a index
                        window.location.href = '/index.html';
                        return;
                    }

                    // Mostrar mensaje del servidor si existe
                    if (body && body.message) {
                        alert(body.message);
                    } else if (resp.status === 401) {
                        alert('Credenciales inválidas. Revisa email y contraseña.');
                    } else if (resp.status === 400) {
                        alert('Solicitud inválida: revisa que hayas ingresado email y contraseña.');
                    } else {
                        alert('Error al iniciar sesión. Código: ' + resp.status);
                    }
                } catch (err) {
                    console.error('Error de red:', err);
                    alert('Error de red al intentar iniciar sesión. Revisa que el servidor esté corriendo.');
                }
            });
        })();
    </script>
</body>
</html>
