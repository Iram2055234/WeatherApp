<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WeatherWise - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">

    <div class="card shadow-sm p-4" style="max-width: 400px; width: 100%;">
        <h3 class="text-center mb-4 text-primary">WeatherWise</h3>
        <form id="loginForm">
            <div class="mb-3">
                <label for="email" class="form-label">Correo electrónico</label>
                <input type="email" id="email" class="form-control" placeholder="admin@weatherwise.com" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Contraseña</label>
                <input type="password" id="password" class="form-control" placeholder="Admin123" required>
            </div>
            <button type="submit" class="btn btn-danger w-100">Iniciar sesión</button>
        </form>
        <div id="loginError" class="text-danger mt-3" style="display:none;"></div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                email: document.getElementById('email').value.trim(),
                password: document.getElementById('password').value.trim()
            };

            try {
                const resp = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await resp.json();
                if (resp.ok && data.success) {
                    window.location.href = '/index.html';
                } else {
                    document.getElementById('loginError').style.display = '';
                    document.getElementById('loginError').textContent = data.message || 'Credenciales inválidas';
                }
            } catch (err) {
                document.getElementById('loginError').style.display = '';
                document.getElementById('loginError').textContent = 'Error al conectar con el servidor';
            }
        });
    </script>
</body>
</html>
